# Lumenara Docker Test Suite
# 
# Тестирование сборки пакетов в изолированном окружении ALT Linux p11
#
# ВАЖНО: Перед использованием установите переменную STPLR_PATH
#   export STPLR_PATH=$(which stplr)
#
# Использование:
#   docker compose build                  # Собрать все образы
#   docker compose up                     # Запустить все тесты
#   docker compose up winegui             # Тестировать только winegui
#   docker compose logs -f <package>      # Смотреть логи

services:
  adwyra:
    build:
      context: ../../adwyra
      dockerfile: ../test/docker/Dockerfile.package
    volumes:
      - ../../adwyra:/build:ro
      - ${STPLR_PATH:-/usr/bin/stplr}:/usr/local/bin/stplr:ro
    
